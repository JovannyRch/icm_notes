services:
    # Aplicación Laravel
    app:
        build:
            context: .
            dockerfile: Dockerfile
        image: icm_notes_app
        container_name: icm_notes_app
        restart: unless-stopped
        working_dir: /var/www
        volumes:
            - ./:/var/www
            - ./storage:/var/www/storage
            - ./bootstrap/cache:/var/www/bootstrap/cache
        networks:
            - icm_notes_network
        depends_on:
            - db

    # Nginx Web Server
    nginx:
        image: nginx:alpine
        container_name: icm_notes_nginx
        restart: unless-stopped
        ports:
            - "8000:80"
        volumes:
            - ./:/var/www
            - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
        networks:
            - icm_notes_network
        depends_on:
            - app

    # Base de datos MySQL
    db:
        image: mysql:8.0
        container_name: icm_notes_db
        restart: unless-stopped
        environment:
            MYSQL_DATABASE: icm_notes
            MYSQL_ROOT_PASSWORD: root
            MYSQL_PASSWORD: password
            MYSQL_USER: laravel
        volumes:
            - dbdata:/var/lib/mysql
        ports:
            - "3306:3306"
        networks:
            - icm_notes_network
        command: --default-authentication-plugin=mysql_native_password

    # Redis (opcional, para cache y colas)
    redis:
        image: redis:alpine
        container_name: icm_notes_redis
        restart: unless-stopped
        ports:
            - "6379:6379"
        networks:
            - icm_notes_network

    # Vite Dev Server (para desarrollo)
    vite:
        image: node:18-alpine
        container_name: icm_notes_vite
        working_dir: /var/www
        volumes:
            - ./:/var/www
        ports:
            - "5173:5173"
        networks:
            - icm_notes_network
        command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

networks:
    icm_notes_network:
        driver: bridge

volumes:
    dbdata:
        driver: local
